<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking App - Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #1a1a2e; font-size: 28px; }
        .logo p { color: #666; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 14px; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #4361ee; }
        .btn { width: 100%; padding: 13px; background: #4361ee; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #3451d1; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .link a { color: #4361ee; text-decoration: none; font-weight: 600; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🏦 BankingApp</h1>
        <p>Create Your Account</p>
    </div>

    <div id="errorMsg" class="alert alert-error" style="display:none;"></div>
    <div id="successMsg" class="alert alert-success" style="display:none;"></div>

    <form id="registerForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Sign in here</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if (response.ok) {
                successMsg.textContent = 'Registration successful! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                const data = await response.json();
                const msg = typeof data === 'object' && data.message ? data.message :
                            Object.values(data).join(', ');
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent = 'Connection error. Please try again.';
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
